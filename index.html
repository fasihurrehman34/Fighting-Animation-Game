<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighting Game Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="player1" class="player">
        <img id="p1-stand" class="active" src="https://www.fightersgeneration.com/characters2/jimmy-powagysa.gif" alt="stand">
        <img id="p1-jump" src="https://www.fightersgeneration.com/characters2/xjimmyshoryu.gif" alt="up - down">
        <img id="p1-walk" src="https://www.fightersgeneration.com/characters2/jimmy-walk.gif" alt="right - left">
        <img id="p1-run" src="https://www.fightersgeneration.com/characters2/jimmyrun.gif" alt="run">
        <img id="p1-fight" src="https://www.fightersgeneration.com/characters2/jimmy-burningknuckle.gif" alt="fight">
    </div>

    <div id="player2" class="player">
        <img id="p2-stand" class="active" src="https://www.fightersgeneration.com/nf8/char3/jin-kisaragi-blazblue-special.gif" alt="stand">
        <img id="p2-jump" src="https://www.fightersgeneration.com/nf8/char3/jin-kisaragi-blazblue-twirl.jpg" alt="up - down">
        <img id="p2-walk" src="https://www.fightersgeneration.com/nz4/char/jin-kisaragi-blazblue-walkforward.gif" alt="right - down">
        <img id="p2-run" src="https://www.fightersgeneration.com/np5/blaz-cs/sprites/2/jink-run.gif" alt="run">
        <img id="p2-fight" src="https://www.fightersgeneration.com/nf8/char3/jin-kisaragi-blazblue-loop.gif" alt="fight">
    </div>

    <script src="app.js"></script>
    
</body>
</html>
